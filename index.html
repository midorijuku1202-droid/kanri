<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>みどり塾 学習管理</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Hiragino Sans','Meiryo',sans-serif;background:#f4f7f5;color:#1a2e20;max-width:700px;margin:0 auto}
:root{
  --green:#2d6a4f;--green-l:#52b788;--green-m:#95d5b2;--green-p:#d8f3dc;
  --red:#ef4444;--orange:#f97316;--blue:#3b82f6;
  --gray1:#f8f9fa;--gray2:#e9ecef;--gray3:#adb5bd;
  --shadow:0 2px 8px rgba(0,0,0,.08);--r:14px
}
header{background:var(--green);color:white;padding:12px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100}
.logo{width:36px;height:36px;background:rgba(255,255,255,.2);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px}
header h1{font-size:16px;font-weight:700}
header small{font-size:11px;opacity:.7}
.tabs{display:flex;background:white;border-bottom:2px solid var(--green-p);overflow-x:auto;-webkit-overflow-scrolling:touch;position:sticky;top:60px;z-index:99;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab-btn{flex:1;min-width:56px;padding:10px 4px;border:none;background:none;font-size:11px;color:var(--gray3);cursor:pointer;border-bottom:3px solid transparent;font-weight:600;white-space:nowrap}
.tab-btn.active{color:var(--green);border-bottom-color:var(--green)}
.view{display:none;padding:12px;min-height:calc(100vh - 128px)}
.view.active{display:block}
.card{background:white;border-radius:var(--r);padding:14px 16px;margin-bottom:10px;box-shadow:var(--shadow)}
.btn{padding:8px 16px;border-radius:10px;border:none;font-size:13px;font-weight:700;cursor:pointer;display:inline-block}
.btn-green{background:var(--green);color:white}
.btn-gray{background:var(--gray2);color:#333}
.btn-red{background:#fee2e2;color:#ef4444;border:1px solid #fca5a5}
.btn-orange{background:#fed7aa;color:#c2410c;border:1px solid #fdba74}
.btn-sm{padding:5px 10px;font-size:11px;border-radius:8px}
.grade-row{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.gbtn{padding:7px 16px;border-radius:20px;border:2px solid var(--green-m);background:white;color:var(--green);font-size:12px;font-weight:700;cursor:pointer}
.gbtn.active{background:var(--green);color:white}
.search{width:100%;padding:10px 14px;border-radius:12px;border:2px solid var(--gray2);font-size:14px;outline:none;margin-bottom:12px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.s-card{background:white;border-radius:12px;padding:12px;box-shadow:var(--shadow);cursor:pointer;border:2px solid transparent}
.s-card:active{border-color:var(--green)}
.s-name{font-size:15px;font-weight:700}
.s-sub{font-size:11px;color:var(--gray3)}
.s-tag{display:inline-block;background:var(--green-p);color:var(--green);border-radius:20px;padding:2px 8px;font-size:11px;font-weight:600;margin-top:3px}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--green);color:white;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:700;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;display:none;align-items:center;justify-content:center;padding:16px}
.modal-bg.open{display:flex}
.modal{background:white;border-radius:var(--r);padding:20px;width:100%;max-width:420px;max-height:90vh;overflow-y:auto}
.modal h2{font-size:16px;font-weight:700;color:var(--green);margin-bottom:16px}
.mrow{margin-bottom:12px}
.mlabel{font-size:12px;font-weight:700;color:var(--gray3);margin-bottom:4px}
.mrow input,.mrow select{width:100%;padding:10px 12px;border-radius:8px;border:2px solid var(--gray2);font-size:14px;outline:none}
.mact{display:flex;gap:8px;margin-top:16px}
.mact button{flex:1}
/* 計画シート */
.plan-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
#plan-table{border-collapse:collapse;width:100%;font-size:11px;min-width:520px}
#plan-table th{background:var(--green-p);padding:6px 4px;text-align:center;border-bottom:2px solid var(--green-m);white-space:nowrap;color:var(--green);font-size:11px}
#plan-table td{border-bottom:1px solid var(--gray2);padding:3px 2px;vertical-align:top}
#plan-table tr.done{background:#f0faf4}
#plan-table tr.active{background:#eff6ff}
.ps,.pi{width:100%;padding:3px 2px;border-radius:5px;border:1px solid var(--gray2);font-size:11px;background:white}
.ps.filled,.pi.filled{background:#bae6fd;border-color:#7dd3fc}
/* 今日カード */
.tcard{border-radius:12px;padding:12px 14px;margin-bottom:8px;box-shadow:var(--shadow);background:white}
.tcard.absent{border:2px solid #ef4444;background:#fff5f5}
.tcard.transfer{border:2px solid var(--orange);background:#fff7ed}
.tcard.pending{border:2px solid #ef4444;background:#fff5f5}
.tcard.recorded{border:2px solid var(--blue);background:#eff6ff}
/* 進捗オーバーレイ */
.pim{position:fixed;inset:0;background:white;z-index:400;display:none;flex-direction:column}
.pim.open{display:flex}
.pim-head{background:var(--green);color:white;padding:12px 16px;display:flex;align-items:center;gap:8px;flex-shrink:0}
.pim-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px}
.ptbl{border-collapse:collapse;width:100%;font-size:11px}
.ptbl th{background:#f5f5f5;padding:6px 4px;border-bottom:2px solid var(--green-m);text-align:center;white-space:nowrap}
.ptbl td{border-bottom:1px solid var(--gray2);padding:3px 2px;vertical-align:middle}
.ptbl select,.ptbl input{width:100%;padding:3px 2px;border-radius:5px;border:1px solid var(--gray2);font-size:11px}
.fc{background:#bae6fd!important;border-color:#7dd3fc!important}
.rc{background:#fee2e2!important;color:#c0392b!important;font-weight:700}
/* day buttons */
.day-btn{padding:6px 12px;border-radius:20px;border:2px solid var(--green-m);background:white;font-size:13px;font-weight:700;cursor:pointer;color:var(--green)}
.day-btn.on{background:var(--green);color:white;border-color:var(--green)}
/* loading */
#loading{position:fixed;inset:0;background:rgba(45,106,79,.92);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px}
#loading.hide{display:none}
.spin{width:44px;height:44px;border:4px solid rgba(255,255,255,.3);border-top:4px solid white;border-radius:50%;animation:sp .8s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
#loading p{color:white;font-size:15px;font-weight:700}
/* PDF preview */
#pdf-modal{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:700;display:none;flex-direction:column}
#pdf-modal.open{display:flex}
#pdf-head{background:var(--green);color:white;padding:10px 16px;display:flex;align-items:center;gap:8px;flex-shrink:0}
#pdf-hint{background:#f0f0f0;padding:8px 16px;font-size:12px;color:#444;flex-shrink:0}
#pdf-content{flex:1;overflow-y:auto;background:white;padding:16px}
@media print{
  body>*:not(#pdf-modal){display:none!important}
  #pdf-modal{display:flex!important;position:static!important;background:white!important}
  #pdf-head,#pdf-hint{display:none!important}
  #pdf-content{overflow:visible!important;max-height:none!important}
}
</style>
</head>
<body>

<div id="loading"><div class="spin"></div><p>読み込み中...</p></div>
<div id="toast" class="toast"></div>

<header>
  <div class="logo">🌿</div>
  <div><h1>学習管理システム</h1><small>みどり塾</small></div>
</header>

<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('input')">📝 指示入力</button>
  <button class="tab-btn" onclick="switchTab('today')">📅 本日</button>
  <button class="tab-btn" onclick="switchTab('settings')">⚙️ 生徒管理</button>
  <button class="tab-btn" onclick="switchTab('progress')">📊 進捗表</button>
  <button class="tab-btn" onclick="switchTab('share')">📤 共有</button>
</div>

<!-- 指示入力 -->
<div id="view-input" class="view active">
  <div id="sel-panel">
    <div class="grade-row" id="input-grade-row">
      <button class="gbtn active" onclick="setInputGrade('all',this)">全員</button>
      <button class="gbtn" onclick="setInputGrade('中1',this)">中1</button>
      <button class="gbtn" onclick="setInputGrade('中2',this)">中2</button>
      <button class="gbtn" onclick="setInputGrade('中3',this)">中3</button>
    </div>
    <input class="search" placeholder="🔍 生徒名で検索..." oninput="renderStudentGrid(this.value)">
    <div class="grid2" id="student-grid"></div>
  </div>
  <div id="plan-panel" style="display:none">
    <div style="background:var(--green);color:white;padding:12px 16px;border-radius:var(--r);margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;gap:8px">
      <div style="flex:1;min-width:0">
        <div style="font-size:16px;font-weight:700" id="pp-name"></div>
        <div style="font-size:11px;opacity:.8" id="pp-info"></div>
      </div>
      <div style="display:flex;gap:5px;flex-shrink:0">
        <button class="btn btn-sm" style="background:rgba(255,255,255,.2);color:white;border:1px solid rgba(255,255,255,.4)" onclick="openProgress()">📊</button>
        <button class="btn btn-sm" style="background:rgba(255,255,255,.2);color:white;border:1px solid rgba(255,255,255,.4)" onclick="backToGrid()">← 戻る</button>
      </div>
    </div>
    <div class="card" style="padding:0;overflow:hidden">
      <div style="background:var(--green-p);padding:10px 16px;display:flex;align-items:center;justify-content:space-between">
        <span style="font-size:13px;font-weight:700;color:var(--green)">📋 学習計画シート（16コマ）</span>
        <button class="btn btn-sm btn-green" onclick="savePlan()">✅ 保存</button>
      </div>
      <div class="plan-wrap">
        <table id="plan-table">
          <thead><tr>
            <th style="width:34px">済</th>
            <th style="width:64px">日付</th>
            <th style="width:56px">科目</th>
            <th style="width:60px">CT</th>
            <th>実施内容</th>
            <th>宿題</th>
            <th style="width:80px">メモ</th>
          </tr></thead>
          <tbody id="plan-tbody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- 本日 -->
<div id="view-today" class="view">
  <div style="display:flex;align-items:center;gap:6px;margin-bottom:12px">
    <button onclick="shiftDay(-1)" style="padding:8px 14px;border-radius:10px;border:2px solid var(--green-m);background:white;font-size:18px;cursor:pointer;color:var(--green)">‹</button>
    <input type="date" id="today-dp" onchange="renderToday()" style="flex:1;padding:8px 10px;border-radius:10px;border:2px solid var(--green-m);font-size:14px;font-weight:700;color:var(--green);outline:none;text-align:center">
    <button onclick="shiftDay(1)" style="padding:8px 14px;border-radius:10px;border:2px solid var(--green-m);background:white;font-size:18px;cursor:pointer;color:var(--green)">›</button>
    <button onclick="goToday()" style="padding:7px 12px;border-radius:20px;background:var(--green);border:none;color:white;font-size:12px;font-weight:700;cursor:pointer">今日</button>
  </div>
  <div class="grade-row">
    <button class="gbtn active" onclick="setTodayGrade('all',this)">全員</button>
    <button class="gbtn" onclick="setTodayGrade('中1',this)">中1</button>
    <button class="gbtn" onclick="setTodayGrade('中2',this)">中2</button>
    <button class="gbtn" onclick="setTodayGrade('中3',this)">中3</button>
  </div>
  <div id="today-stats" style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px"></div>
  <div id="today-list"></div>
</div>

<!-- 生徒管理 -->
<div id="view-settings" class="view">
  <button class="btn btn-green" style="width:100%;margin-bottom:12px" onclick="openAddStudent()">＋ 生徒を追加</button>
  <div class="grade-row">
    <button class="gbtn active" onclick="setSettingsGrade('all',this)">全員</button>
    <button class="gbtn" onclick="setSettingsGrade('中1',this)">中1</button>
    <button class="gbtn" onclick="setSettingsGrade('中2',this)">中2</button>
    <button class="gbtn" onclick="setSettingsGrade('中3',this)">中3</button>
  </div>
  <input class="search" placeholder="🔍 生徒名で検索..." oninput="renderSettings(this.value)">
  <div id="settings-list"></div>
</div>

<!-- 進捗表 -->
<div id="view-progress" class="view">
  <div class="grade-row">
    <button class="gbtn active" onclick="setProgressGrade('all',this)">全員</button>
    <button class="gbtn" onclick="setProgressGrade('中1',this)">中1</button>
    <button class="gbtn" onclick="setProgressGrade('中2',this)">中2</button>
    <button class="gbtn" onclick="setProgressGrade('中3',this)">中3</button>
  </div>
  <input class="search" placeholder="🔍 生徒名で検索..." oninput="renderProgressList(this.value)">
  <div id="progress-list"></div>
</div>

<!-- 共有 -->
<div id="view-share" class="view">
  <div style="background:var(--green-p);border-radius:var(--r);padding:12px 16px;margin-bottom:14px;font-size:13px;color:var(--green);line-height:1.7">
    📄 生徒を選ぶ → プレビュー → Safari共有(↑) → 「PDFを作成」→ LINE送信
  </div>
  <div class="grade-row">
    <button class="gbtn active" onclick="setShareGrade('all',this)">全員</button>
    <button class="gbtn" onclick="setShareGrade('中1',this)">中1</button>
    <button class="gbtn" onclick="setShareGrade('中2',this)">中2</button>
    <button class="gbtn" onclick="setShareGrade('中3',this)">中3</button>
  </div>
  <input class="search" placeholder="🔍 生徒名で検索..." oninput="renderShare(this.value)">
  <div id="share-list"></div>
</div>

<!-- 進捗入力オーバーレイ -->
<div class="pim" id="pim">
  <div class="pim-head">
    <div style="flex:1"><div style="font-size:15px;font-weight:700" id="pim-title"></div><div style="font-size:11px;opacity:.8" id="pim-sub"></div></div>
    <button id="pim-mode-btn" onclick="togglePimMode()" style="background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.4);color:white;padding:5px 10px;border-radius:8px;font-size:11px;cursor:pointer">✏️ マスター編集</button>
    <button onclick="savePimAndClose()" style="background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.4);color:white;padding:5px 10px;border-radius:8px;font-size:11px;cursor:pointer;margin-left:4px">✅ 保存</button>
    <button id="pim-back-btn" onclick="closePim()" style="background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.4);color:white;padding:5px 10px;border-radius:8px;font-size:11px;cursor:pointer;margin-left:4px;display:none">← 戻る</button>
    <button id="pim-close-btn" onclick="closePim()" style="background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.4);color:white;padding:5px 10px;border-radius:8px;font-size:11px;cursor:pointer;margin-left:4px">✕</button>
  </div>
  <div class="pim-body">
    <div style="overflow-x:auto;-webkit-overflow-scrolling:touch">
      <table class="ptbl"><thead id="pim-thead"></thead><tbody id="pim-tbody"></tbody></table>
    </div>
  </div>
</div>

<!-- 教材追加モーダル -->
<div class="modal-bg" id="tb-modal">
  <div class="modal">
    <h2 id="tb-modal-title">教材を追加</h2>
    <div class="mrow"><div class="mlabel">教材・学年を選択</div>
      <select id="tb-combo" style="width:100%;padding:10px 12px;border-radius:8px;border:2px solid var(--gray2);font-size:14px;outline:none">
        <option value="">選択してください</option>
      </select>
    </div>
    <div class="mact">
      <button class="btn btn-gray" onclick="closeTbModal()">キャンセル</button>
      <button class="btn btn-green" onclick="addTextbook()">追加</button>
    </div>
  </div>
</div>

<!-- 生徒追加/編集モーダル -->
<div class="modal-bg" id="s-modal">
  <div class="modal">
    <h2 id="s-modal-title">生徒を追加</h2>
    <div class="mrow"><div class="mlabel">名前</div><input id="m-name" placeholder="例：山田太郎"></div>
    <div class="mrow"><div class="mlabel">よみ</div><input id="m-yomi" placeholder="例：やまだたろう"></div>
    <div class="mrow"><div class="mlabel">学年</div><select id="m-grade"><option>中1</option><option>中2</option><option>中3</option></select></div>
    <div class="mrow"><div class="mlabel">学校名</div><input id="m-school" placeholder="例：鳴子台"></div>
    <div class="mrow">
      <div class="mlabel">来塾曜日（最大4日）</div>
      <div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:6px" id="day-btns">
        <button type="button" class="day-btn" data-d="月" onclick="toggleDay(this)">月</button>
        <button type="button" class="day-btn" data-d="火" onclick="toggleDay(this)">火</button>
        <button type="button" class="day-btn" data-d="水" onclick="toggleDay(this)">水</button>
        <button type="button" class="day-btn" data-d="木" onclick="toggleDay(this)">木</button>
        <button type="button" class="day-btn" data-d="金" onclick="toggleDay(this)">金</button>
        <button type="button" class="day-btn" data-d="土" onclick="toggleDay(this)">土</button>
      </div>
    </div>
    <div class="mact">
      <button class="btn btn-gray" onclick="closeSModal()">キャンセル</button>
      <button class="btn btn-red" id="s-del-btn" onclick="deleteStudent()" style="display:none">削除</button>
      <button class="btn btn-green" onclick="saveStudent()">保存</button>
    </div>
  </div>
</div>

<!-- 振替モーダル -->
<div class="modal-bg" id="tr-modal">
  <div class="modal">
    <h2>🔄 振替日を設定</h2>
    <div style="font-size:13px;color:#666;margin-bottom:12px" id="tr-name"></div>
    <div class="mrow"><div class="mlabel">振替日</div><input type="date" id="tr-date"></div>
    <div style="display:flex;gap:6px;margin-top:8px;flex-wrap:wrap">
      <button class="btn btn-sm btn-gray" onclick="setTrDate(1)">明日</button>
      <button class="btn btn-sm btn-gray" onclick="setTrDate(2)">明後日</button>
      <button class="btn btn-sm btn-gray" onclick="setTrDate(3)">3日後</button>
      <button class="btn btn-sm btn-gray" onclick="setTrDate(7)">1週間後</button>
    </div>
    <div class="mact">
      <button class="btn btn-gray" onclick="closeTrModal()">キャンセル</button>
      <button class="btn btn-green" onclick="confirmTransfer()">✅ 登録</button>
    </div>
  </div>
</div>

<!-- PDF プレビュー -->
<div id="pdf-modal">
  <div id="pdf-head">
    <span style="color:white;font-size:14px;font-weight:700;flex:1">📄 プレビュー</span>
    <button onclick="openPrintTab()" style="background:rgba(255,255,255,.2);border:none;color:white;padding:6px 12px;border-radius:8px;font-size:12px;cursor:pointer">🖨️ 印刷用</button>
    <button onclick="closePdf()" style="background:rgba(255,255,255,.2);border:none;color:white;padding:6px 12px;border-radius:8px;font-size:13px;cursor:pointer;margin-left:4px">✕</button>
  </div>
  <div id="pdf-hint">Safari共有（↑）→「PDFを作成」→ LINE で送信</div>
  <div id="pdf-content"></div>
</div>

<script>
const SB_URL='https://ptmivonoirpsfwsnkjbi.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB0bWl2b25vaXJwc2Z3c25ramJpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA5NzY2ODYsImV4cCI6MjA5NjU1MjY4Nn0.gyMR1lG-Q3MDQCO5S689UTkDe85XriUHDO1XWgmk9kA';
const FO={mode:'cors',credentials:'omit'};
const AH={'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY};
const JH={...AH,'Content-Type':'application/json','Prefer':'return=minimal'};

async function sbGet(t,p=''){const r=await fetch(SB_URL+'/rest/v1/'+t+'?'+p,{...FO,headers:AH});if(!r.ok)throw new Error(await r.text());return r.json();}
async function sbPost(t,d){const r=await fetch(SB_URL+'/rest/v1/'+t,{...FO,method:'POST',headers:JH,body:JSON.stringify(d)});if(!r.ok)throw new Error(await r.text());}
async function sbPatch(t,f,d){const r=await fetch(SB_URL+'/rest/v1/'+t+'?'+f,{...FO,method:'PATCH',headers:JH,body:JSON.stringify(d)});if(!r.ok)throw new Error(await r.text());}
async function sbDelete(t,f){const r=await fetch(SB_URL+'/rest/v1/'+t+'?'+f,{...FO,method:'DELETE',headers:AH});if(!r.ok)throw new Error(await r.text());}

const BASE_STUDENTS = [
  {name:"大山幸祐",yomi:"こうすけ",grade:"中1",school:"鳴子台"},
  {name:"牧美優希",yomi:"みゆき",grade:"中2",school:"鳴子台"},

async function loadStudents(){
  try{
    const rows=await sbGet('students','select=*&order=grade.asc,name.asc');
    if(rows&&rows.length){
      _students=rows;
      // days列からlocalStorageに同期
      const sc={};
      rows.forEach(r=>{
        try{ const d=JSON.parse(r.days||'[]'); if(d.length) sc[r.id]=d; }catch(e){}
      });
      if(Object.keys(sc).length) lss('midori_days',sc);
    } else {
      const list=BASE_STUDENTS.map((s,i)=>({id:'s'+i,name:s.name,yomi:s.yomi,grade:s.grade,school:s.school}));
      for(let i=0;i<list.length;i+=50)await sbPost('students',list.slice(i,i+50));
      _students=list;
    }
  }catch(e){console.error('loadStudents',e);if(!_students||!_students.length)_students=BASE_STUDENTS.map((s,i)=>({...s,id:'s'+i}));}
}
async function loadPS(){
  try{
    const rows=await sbGet('progress','select=*');
    _ps={};
    (rows||[]).forEach(r=>{try{_ps[r.student_id]=JSON.parse(r.data_json||'{}')}catch(e){}} );
  }catch(e){console.error('loadPS',e);if(!_ps)_ps={};}
}
async function loadCM(){
  try{
    const rows=await sbGet('master_custom','select=*');
    _cm={};
    (rows||[]).forEach(r=>{try{_cm[r.tb_key]=JSON.parse(r.data_json||'[]')}catch(e){}} );
  }catch(e){console.error('loadCM',e);if(!_cm)_cm={};}
}
async function saveSidPS(sid){
  if(!_ps||!_ps[sid])return;
  const dj=JSON.stringify(_ps[sid]);
  try{
    const rows=await sbGet('progress','select=student_id&student_id=eq.'+encodeURIComponent(sid));
    if(rows&&rows.length)await sbPatch('progress','student_id=eq.'+encodeURIComponent(sid),{data_json:dj});
    else await sbPost('progress',{student_id:sid,data_json:dj});
  }catch(e){console.error('saveSidPS',e);showToast('⚠️ 保存エラー: '+e.message);}
}
async function saveSidCM(key){
  if(!_cm||!_cm[key])return;
  const dj=JSON.stringify(_cm[key]);
  try{
    const rows=await sbGet('master_custom','select=tb_key&tb_key=eq.'+encodeURIComponent(key));
    if(rows&&rows.length)await sbPatch('master_custom','tb_key=eq.'+encodeURIComponent(key),{data_json:dj});
    else await sbPost('master_custom',{tb_key:key,data_json:dj});
  }catch(e){console.error('saveSidCM',e);}
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function escH(s){return esc(s);}
function todayKey(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function dow(dk){return['日','月','火','水','木','金','土'][new Date(dk+'T00:00:00').getDay()];}
function ls(k){try{return JSON.parse(localStorage.getItem(k)||'{}')}catch(e){return {}}}
function lss(k,v){localStorage.setItem(k,JSON.stringify(v));}
function getDays(){return ls('midori_days');}
function getAbs(){return ls('midori_abs');}
function getTrs(){return ls('midori_tr');}

// tab
function switchTab(tab){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('view-'+tab).classList.add('active');
  const ti=['input','today','settings','progress','share'].indexOf(tab);
  const tbs=document.querySelectorAll('.tab-btn');
  if(ti>=0&&tbs[ti])tbs[ti].classList.add('active');

  const sinceLastSave = Date.now() - (_lastSave||0);
  const needRefresh = sinceLastSave > 3000;

  if(tab==='input'){
    if(needRefresh) loadStudents().then(()=>renderStudentGrid());
    else renderStudentGrid();
  }
  if(tab==='today'){
    if(needRefresh) Promise.all([loadStudents(),loadPS()]).then(()=>renderToday());
    else renderToday();
  }
  if(tab==='settings'){
    loadStudents().then(()=>renderSettings());
  }
  if(tab==='progress'){
    if(needRefresh) Promise.all([loadStudents(),loadPS()]).then(()=>renderProgressList());
    else renderProgressList();
  }
  if(tab==='share'){
    if(needRefresh) loadStudents().then(()=>renderShare());
    else renderShare();
  }
}

function renderStudentGrid(q=''){
  const list=S().filter(s=>(_ig==='all'||s.grade===_ig)&&(!q||(s.name+s.yomi).includes(q)));
  const el=document.getElementById('student-grid');
  if(!el)return;
  el.innerHTML=list.map(s=>{
    const plan=(PS()[s.id]||{}).plan||[];
    const entries=plan.filter(r=>r.subject||r.instruction);

function insertStepToPlan(step) {
  if (!step) return;
  const focus = window._planFocus;
  if (focus && focus.row !== undefined && focus.field) {
    const cur = planRows[focus.row][focus.field] || '';
    planRows[focus.row][focus.field] = cur ? cur + '　' + step : step;
    renderPlanTable();
    showToast('📝 ' + step + ' を追記しました');
  } else {
    showToast('⚠️ CT・実施内容・宿題のいずれかをタップしてから押してください');
  }
}

function renderPlanTable(){
  const now=new Date();
  const dopts=[''];
  for(let d=-3;d<=30;d++){const t=new Date(now);t.setDate(t.getDate()+d);dopts.push((t.getMonth()+1)+'/'+(t.getDate()));}
  const tb=document.getElementById('plan-tbody');
  if(!tb)return;
  tb.innerHTML=planRows.map((r,i)=>{
    const cls=r.done?'done':(r.instruction||r.subject)?'active':'';
    const ds=dopts.map(d=>`<option value="${d}" ${d===r.date?'selected':''}>${d||'—'}</option>`).join('');
    const ss=SUBJS.map(s=>`<option value="${s}" ${s===r.subject?'selected':''}>${s||'—'}</option>`).join('');
    const its=ITMPL.map(t=>`<option value="${t}">${t||'▼'}</option>`).join('');
    const hts=HTMPL.map(t=>`<option value="${t}">${t||'▼'}</option>`).join('');
    return `<tr class="${cls}">
      <td style="text-align:center"><input type="checkbox" ${r.done?'checked':''} onchange="planRows[${i}].done=this.checked;renderPlanTable()" style="width:18px;height:18px;cursor:pointer"></td>
      <td><select class="ps ${r.date?'filled':''}" onchange="planRows[${i}].date=this.value;renderPlanTable()">${ds}</select></td>
      <td><select class="ps ${r.subject?'filled':''}" onchange="planRows[${i}].subject=this.value;renderPlanTable()">${ss}</select></td>
      <td>
        <select class="ps" onchange="if(this.value){planRows[${i}].ct=(planRows[${i}].ct?planRows[${i}].ct+'　':'')+this.value;this.value='';renderPlanTable();}">${its}</select>
        <input class="pi ${r.ct?'filled':''}" value="${escH(r.ct||'')}" oninput="planRows[${i}].ct=this.value" onfocus="window._planFocus={row:${i},field:'ct'}" placeholder="CT" style="margin-top:3px">
      </td>
      <td>
        <select class="ps" onchange="if(this.value){planRows[${i}].instruction=(planRows[${i}].instruction?planRows[${i}].instruction+'　':'')+this.value;this.value='';renderPlanTable();}">${its}</select>
        <input class="pi ${r.instruction?'filled':''}" value="${esc(r.instruction||'')}" oninput="planRows[${i}].instruction=this.value" onfocus="window._planFocus={row:${i},field:'instruction'}" placeholder="実施内容" style="margin-top:3px">
      </td>
      <td>
        <select class="ps" onchange="if(this.value){planRows[${i}].homework=(planRows[${i}].homework?planRows[${i}].homework+'　':'')+this.value;this.value='';renderPlanTable();}">${hts}</select>
        <input class="pi ${r.homework?'filled':''}" value="${esc(r.homework||'')}" oninput="planRows[${i}].homework=this.value" onfocus="window._planFocus={row:${i},field:'homework'}" placeholder="宿題" style="margin-top:3px">
      </td>
      <td><input class="pi" value="${esc(r.memo||'')}" oninput="planRows[${i}].memo=this.value" placeholder="メモ"></td>
    </tr>`;
  }).join('');
}

// ===== 本日 =====
let _tg='all';
function goToday(){document.getElementById('today-dp').value=todayKey();renderToday();}
function shiftDay(d){const el=document.getElementById('today-dp');const c=new Date((el.value||todayKey())+'T00:00:00');c.setDate(c.getDate()+d);el.value=c.getFullYear()+'-'+String(c.getMonth()+1).padStart(2,'0')+'-'+String(c.getDate()).padStart(2,'0');renderToday();}
function setTodayGrade(g,btn){_tg=g;document.querySelectorAll('#view-today .gbtn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');renderToday();}

function hasActive(sid){
  const plan=(PS()[sid]||{}).plan||[];
  const ents=plan.filter(r=>r.subject||r.instruction);
  return ents.length>0&&!ents.every(r=>r.done);
}

function renderToday(){
  const el=document.getElementById('today-dp');
  if(!el)return;
  if(!el.value)el.value=todayKey();
  const dk=el.value;
  const d=dow(dk);
  const stu=S();
  const ps=PS();
  const sched=getDays();
  const abs=getAbs();
  const trs=getTrs();
  const absList=abs[dk]||[];
  const trList=trs[dk]||[];
  const trNames=trList.map(t=>t.name);
  const schedStu=stu.filter(s=>(sched[s.id]||[]).includes(d));
  const schedNames=schedStu.map(s=>s.name);
  let allNames=[...new Set([...absList,...trNames,...schedNames])];
  if(_tg!=='all')allNames=allNames.filter(n=>{const s=stu.find(st=>st.name===n);return s?.grade===_tg;});

  // stats
  const se=document.getElementById('today-stats');
  const rc=allNames.filter(n=>{const s=stu.find(st=>st.name===n);return s&&hasActive(s.id);}).length;
  if(se)se.innerHTML=`
    <div class="card" style="text-align:center;padding:12px"><div style="font-size:28px;font-weight:700;color:var(--green)">${schedNames.filter(n=>_tg==='all'||stu.find(st=>st.name===n)?.grade===_tg).length}</div><div style="font-size:12px;color:var(--gray3)">${d}曜日の生徒</div></div>
    <div class="card" style="text-align:center;padding:12px"><div style="font-size:28px;font-weight:700;color:var(--blue)">${rc}</div><div style="font-size:12px;color:var(--gray3)">記入済</div></div>`;

  const le=document.getElementById('today-list');
  if(!le)return;
  if(!allNames.length){le.innerHTML=`<div style="text-align:center;color:var(--gray3);padding:32px;font-size:14px">${d}曜日に登録された生徒がいません</div>`;return;}

  const absent=allNames.filter(n=>absList.includes(n));
  const transfer=allNames.filter(n=>trNames.includes(n)&&!absList.includes(n));
  const rest=allNames.filter(n=>!absList.includes(n)&&!trNames.includes(n));
  const pending=rest.filter(n=>{const s=stu.find(st=>st.name===n);return!s||!hasActive(s.id);});
  const recorded=rest.filter(n=>{const s=stu.find(st=>st.name===n);return s&&hasActive(s.id);});
  const sorted=[...absent,...transfer,...pending,...recorded];

  le.innerHTML=sorted.map(name=>{
    const s=stu.find(st=>st.name===name);
    const isAbs=absList.includes(name);
    const isTr=trNames.includes(name);
    const trInfo=trList.find(t=>t.name===name);
    const hasRec=s&&hasActive(s.id);
    const sn=name.replace(/'/g,"\'");
    let cls='',badge='';
    if(isAbs){cls='absent';badge='<span style="font-size:11px;color:#ef4444;font-weight:700;margin-left:6px">欠席</span>';}
    else if(isTr){cls='transfer';badge=`<span style="font-size:11px;color:var(--orange);font-weight:700;margin-left:6px">🔄振替${trInfo?.fromDate?'('+new Date(trInfo.fromDate+'T00:00:00').toLocaleDateString('ja-JP',{month:'2-digit',day:'2-digit'})+'から)':''}</span>`;}
    else if(!hasRec){cls='pending';badge='<span style="font-size:11px;color:#ef4444;font-weight:700;margin-left:6px">未記入</span>';}
    else{cls='recorded';badge='<span style="font-size:11px;color:var(--blue);font-weight:700;margin-left:6px">記入済</span>';}
    const absBtnSt=isAbs?'background:#ef4444;color:white;border:none':'background:#fee2e2;color:#ef4444;border:1px solid #fca5a5';
    return `<div class="tcard ${cls}">
      <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px">
        <div><span style="font-size:15px;font-weight:700">${esc(name)}</span>${badge}<span style="font-size:11px;color:var(--gray3);margin-left:6px">${s?.grade||''} ${s?.school||''}</span></div>
        <div style="display:flex;gap:5px;flex-wrap:wrap">
          ${s?`<button class="btn btn-sm btn-green" onclick="goPlan('${s.id}','today')">📝 指示表</button>`:''}<button class="btn btn-sm" style="${absBtnSt};padding:5px 10px;border-radius:8px;font-size:11px;cursor:pointer" onclick="toggleAbs('${dk}','${sn}')">${isAbs?'✓ 欠席':'欠席'}</button>
          ${isTr?`<button class="btn btn-sm btn-orange" onclick="removeTr('${dk}','${sn}')">振替解除</button>`:`<button class="btn btn-sm btn-orange" onclick="openTrModal('${dk}','${sn}')">🔄 振替</button>`}
          ${s?`<button class="btn btn-sm btn-sm" style="background:#dbeafe;color:var(--blue);border:none" onclick="openProgressFromToday('${s.id}')">📊 進行表</button>`:''}
          ${s?`<button class="btn btn-sm btn-gray" onclick="printPlanOnly('${encodeURIComponent(name)}')">🖨️</button>`:''}
        </div>
      </div>
    </div>`;
  }).join('');
}

function goPlan(sid,source='input'){
  window._planSource = source;
  switchTab('input');
  setTimeout(()=>openPlan(sid),100);
}
function toggleAbs(dk,name){const a=getAbs();if(!a[dk])a[dk]=[];const i=a[dk].indexOf(name);if(i>=0)a[dk].splice(i,1);else a[dk].push(name);lss('midori_abs',a);renderToday();}

let _trTarget=null;
function openTrModal(dk,name){_trTarget={dk,name};document.getElementById('tr-name').textContent=name+' の振替日';setTrDate(1);document.getElementById('tr-modal').classList.add('open');}
function closeTrModal(){document.getElementById('tr-modal').classList.remove('open');_trTarget=null;}
function setTrDate(days){if(!_trTarget)return;const d=new Date(_trTarget.dk+'T00:00:00');d.setDate(d.getDate()+days);document.getElementById('tr-date').value=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function confirmTransfer(){if(!_trTarget)return;const to=document.getElementById('tr-date').value;if(!to){showToast('⚠️ 振替日を選択してください');return;}const tr=getTrs();if(!tr[to])tr[to]=[];if(!tr[to].find(t=>t.name===_trTarget.name))tr[to].push({name:_trTarget.name,fromDate:_trTarget.dk});lss('midori_tr',tr);closeTrModal();showToast('🔄 振替登録しました');renderToday();}
function removeTr(dk,name){const tr=getTrs();if(tr[dk])tr[dk]=tr[dk].filter(t=>t.name!==name);lss('midori_tr',tr);renderToday();}

function openEditStudent(id){_editSid=id;const s=S().find(st=>st.id===id);if(!s)return;document.getElementById('s-modal-title').textContent='生徒情報を編集';document.getElementById('m-name').value=s.name;document.getElementById('m-yomi').value=s.yomi;document.getElementById('m-grade').value=s.grade;document.getElementById('m-school').value=s.school||'';document.getElementById('s-del-btn').style.display='inline-block';setDays(getDays()[id]||[]);document.getElementById('s-modal').classList.add('open');}
function closeSModal(){document.getElementById('s-modal').classList.remove('open');}
function toggleDay(btn){
  const on = btn.classList.contains('on');
  if(!on){
    const count = document.querySelectorAll('#day-btns .day-btn.on').length;
    if(count>=4){showToast('⚠️ 最大4日');return;}
    btn.classList.add('on');
    btn.style.background='var(--green)';
    btn.style.color='white';
    btn.style.borderColor='var(--green)';
  } else {
    btn.classList.remove('on');
    btn.style.background='white';
    btn.style.color='var(--green)';
    btn.style.borderColor='';
  }
}
function setDays(days){
  document.querySelectorAll('#day-btns .day-btn').forEach(b=>{
    if((days||[]).includes(b.dataset.d)){
      b.classList.add('on');
      b.style.background='var(--green)';
      b.style.color='white';
      b.style.borderColor='var(--green)';
    } else {
      b.classList.remove('on');
      b.style.background='white';
      b.style.color='var(--green)';
      b.style.borderColor='';
    }
  });
}
function getSelDays(){return[...document.querySelectorAll('#day-btns .day-btn.on')].map(b=>b.dataset.d);}
async function saveStudent(){
  const name=document.getElementById('m-name').value.trim();
  const yomi=document.getElementById('m-yomi').value.trim();
  const grade=document.getElementById('m-grade').value;
  const school=document.getElementById('m-school').value.trim();
  if(!name){showToast('⚠️ 名前を入力してください');return;}
  const days=getSelDays();
  if(!_students)_students=[];
  if(_editSid){
    const idx=_students.findIndex(s=>s.id===_editSid);
    if(idx>=0)_students[idx]={..._students[idx],name,yomi,grade,school};
    const sc=getDays();sc[_editSid]=days;lss('midori_days',sc);
    try{
      await sbPatch('students','id=eq.'+encodeURIComponent(_editSid),{name,yomi,grade,school,days:JSON.stringify(days)});
    }catch(e){

function renderPimTable() {

  const isSimple = isKokugo || is10min;

  if (pimMode === 'master') {
    thead.innerHTML = `<tr style="${GR}">${TH('70px','STEP')}${TH('','タイトル')}${TH('80px','教科書P')}${TH('40px','削除')}</tr>`;

      <tr style="border-bottom:1px solid var(--gray1)">

  const nowD = new Date();
  const todayStr = `${nowD.getMonth()+1}/${nowD.getDate()}`;

  tbody.innerHTML = pimRows.map((r, i) => {

      ct:   isSimple ? ['','○','×'] : ['','○','×','△','◎'],
      review: ['','済','未'],

      precheck: isSimple ? ['','○','×'] : ['','◎','○','△','×']
    };
    const inp = (field, ph, w) => {
      const val = r[field] || '';

    const borderB = isEnd ? 'border-bottom:3px solid #e67e22;' : '';
    const borderNoTop = (!isNaN(noNum) && !isNaN(prevNo) && noNum !== prevNo && i > 0) ? 'border-top:2px solid #bbb;' : '';
    const rangeLabel = r.testRangeStart ? '<span style="color:#e67e22;font-weight:700">開始</span>' : r.testRangeEnd ? '<span style="color:#e67e22;font-weight:700">終了</span>' : '—';

    if (isKokugo) {

        <td style="padding:3px;text-align:center;vertical-align:middle">${inp('date','6/9','58px')}</td>
        <td style="padding:3px;text-align:center;vertical-align:middle">${inp('ct','○/×','44px')}</td>
      </tr>`;
    } else if (is10min) {
      return `<tr id="pimr${i}" style="border-bottom:1px solid var(--gray1);${bgRow}${borderT}${borderB}${borderNoTop}">
        <td style="padding:5px 5px;font-size:11px;color:var(--gray3);vertical-align:middle;white-space:nowrap">${escH(r.step||'—')}</td>
        <td style="padding:5px 5px;font-size:12px;vertical-align:middle">${escH(r.title)}</td>
        <td style="padding:3px;text-align:center;vertical-align:middle">${inp('date','6/9','58px')}</td>
        <td style="padding:3px;text-align:center;vertical-align:middle">${inp('ct','○/×','44px')}</td>
        <td style="padding:3px;text-align:center;vertical-align:middle">${inp('retest','○/×','44px')}</td>
      </tr>`;
    } else {
      return `<tr id="pimr${i}" style="border-bottom:1px solid var(--gray1);${bgRow}${borderT}${borderB}">
        <td style="padding:5px 5px;font-size:11px;font-weight:700;color:#1a2e20;vertical-align:middle;white-space:nowrap">
          <button onclick="insertStepToPlan('${escH(r.step||'')}')" style="background:var(--green-p);border:1px solid var(--green-m);border-radius:6px;padding:3px 6px;font-size:11px;font-weight:700;cursor:pointer;color:var(--green);white-space:nowrap">${escH(r.step||'—')}</button>
        </td>
        <td style="padding:5px 5px;font-size:12px;color:var(--gray3);vertical-align:middle">${escH(r.title)}</td>
        <td style="padding:5px 5px;font-size:11px;font-weight:700;color:#1a2e20;text-align:center;white-space:nowrap;vertical-align:middle">${escH(r.page||'')}</td>
        <td style="padding:3px;text-align:center;vertical-align:middle">${inp('date','6/9','50px')}</td>
        <td style="padding:3px;text-align:center;vertical-align:middle">${inp('date2','6/9','50px')}</td>
        <td style="padding:3px;text-align:center;vertical-align:middle">${inp('ct','○/×','40px')}</td>
        <td style="padding:3px;text-align:center;vertical-align:middle;border-left:3px solid var(--green-l)">${inp('review','日付','46px')}</td>
        <td style="padding:3px;text-align:center;vertical-align:middle">${inp('retest','○/×','40px')}</td>
        <td style="padding:3px;text-align:center;vertical-align:middle;border-left:3px solid var(--green-l)">${inp('precheck','◎/○','40px')}</td>
        <td style="padding:3px;text-align:center;vertical-align:middle">${rangeBtn}</td>
      </tr>`;
    }
  }).join('');
}

async function savePim() {
  const ps=getPS();
  if (!ps[pimSid]) ps[pimSid]={textbooks:[],data:{}};
  if (pimMode==='master') {
    // Save as custom master AND sync all students
    const cm=getCustomMaster();
    const tbKey=(TB_MENU[ps[pimSid].textbooks.find(t=>t.key===pimKey)?.name]||{})[ps[pimSid].textbooks.find(t=>t.key===pimKey)?.grade]||pimKey;
    cm[tbKey]=pimRows.map(r=>{return {step:r.step,title:r.title,page:r.page||''}});
    await saveCustomMaster(cm);
    // Sync all students with this key
    const allPs=getPS();
    Object.keys(allPs).forEach(sid=>{
      if ((allPs[sid].textbooks||[]).find(t=>t.key===pimKey)) {
        const old=allPs[sid].data[pimKey]||[];
        allPs[sid].data[pimKey]=pimRows.map(nr=>{
          const ex=old.find(o=>o.step===nr.step&&o.title===nr.title)||{};
          return {step:nr.step,title:nr.title,page:nr.page||'',date:ex.date||'',ct:ex.ct||'',review:ex.review||'',retest:ex.retest||'',precheck:ex.precheck||'',testRangeStart:ex.testRangeStart||false,testRangeEnd:ex.testRangeEnd||false};
        });
      }
    });
    await savePS(allPs, Object.keys(allPs)); // マスター変更時は全員
    pimRows=allPs[pimSid]?.data[pimKey]||pimRows;
    showToast('✅ マスターを保存・全生徒に反映しました');
  } else {
    ps[pimSid].data[pimKey]=pimRows;
    await savePS(ps, [pimSid]); // 変更した生徒だけ保存
    showToast('✅ 進捗を保存しました');
  }
  renderProgressList();
  closeProgressInput();
}

    const filled = rows.filter(r=>r.date||r.ct||r.review||r.retest||r.precheck).length;
    tabHtml += `<button class="sp-tab-btn" data-idx="${i}" onclick="switchSpTab(${i})"
      style="padding:7px 14px;border-radius:20px;border:2px solid var(--green-m);font-size:12px;font-weight:700;cursor:pointer;
      background:${i===0?'var(--green)':'white'};color:${i===0?'white':'var(--green)'}">
      ${tb.name}<span style="font-size:10px;font-weight:400;margin-left:4px">${tb.grade}</span>
      ${filled>0?`<span style="background:${i===0?'rgba(255,255,255,.3)':'var(--green-p)'};border-radius:8px;padding:1px 5px;margin-left:4px;font-size:10px">${filled}</span>`:''}
    </button>`;
  });
  tabHtml += '</div>';

  // コンテンツエリア
  tabHtml += '<div id="sp-tab-content"></div>';
  el.innerHTML = tabHtml;

  // 最初のタブを表示
  window._spTbs = tbs;
  window._spSid = sid;
  switchSpTab(0);
  document.getElementById('student-progress-modal').classList.add('open');
}

function closeStudentProgress() {
  document.getElementById('student-progress-modal').classList.remove('open');
}

function switchSpTab(idx) {
  const tbs = window._spTbs;
  const sid = window._spSid;
  const ps = getPS();
  if (!tbs || idx >= tbs.length) return;

  document.querySelectorAll('.sp-tab-btn').forEach((btn, i) => {
    btn.style.background = i===idx ? 'var(--green)' : 'white';
    btn.style.color = i===idx ? 'white' : 'var(--green)';
  });

  const tb = tbs[idx];
  const rows = ((ps[sid]||{}).data||{})[tb.key]||[];
  const filled = rows.filter(r=>r.date||r.ct||r.review||r.retest||r.precheck).length;
  const isKokugo = tb.name.includes('国語文章題');
  const is10min  = tb.name.includes('10分テスト');

  let tableHtml = `<div style="font-size:12px;color:var(--gray3);margin-bottom:8px">${filled}/${rows.length}件入力済</div>
    <div style="overflow-x:auto;-webkit-overflow-scrolling:touch">
    <table style="width:100%;border-collapse:collapse;font-size:11px;min-width:300px">`;

  if (isKokugo) {
    tableHtml += `<tr style="background:#f5f5f5">
      <th style="padding:5px 6px;border:1px solid #ddd;text-align:left">No.</th>
      <th style="padding:5px 6px;border:1px solid #ddd;text-align:left">問題</th>
      <th style="padding:5px 6px;border:1px solid #ddd;text-align:center">実施日</th>
      <th style="padding:5px 6px;border:1px solid #ddd;text-align:center">合否</th>
    </tr>`;
  } else if (is10min) {
    tableHtml += `<tr style="background:#f5f5f5">
      <th style="padding:5px 6px;border:1px solid #ddd;text-align:left">No.</th>
      <th style="padding:5px 6px;border:1px solid #ddd;text-align:left">科目</th>
      <th style="padding:5px 6px;border:1px solid #ddd;text-align:center">実施日</th>
      <th style="padding:5px 6px;border:1px solid #ddd;text-align:center">合否</th>
      <th style="padding:5px 6px;border:1px solid #ddd;text-align:center">再テスト</th>
    </tr>`;
  } else {
    tableHtml += `<tr style="background:#f5f5f5">
      <th style="padding:5px 6px;border:1px solid #ddd;text-align:left;white-space:nowrap">STEP</th>
      <th style="padding:5px 6px;border:1px solid #ddd;text-align:left">タイトル</th>
      <th style="padding:5px 6px;border:1px solid #ddd;text-align:center;white-space:nowrap">P</th>
      <th style="padding:5px 6px;border:1px solid #ddd;text-align:center;white-space:nowrap">実施日①</th>
      <th style="padding:5px 6px;border:1px solid #ddd;text-align:center;white-space:nowrap">実施日②</th>
      <th style="padding:5px 6px;border:1px solid #ddd;text-align:center">CT①</th>
      <th style="padding:5px 6px;border:1px solid #ddd;text-align:center">補習</th>
      <th style="padding:5px 6px;border:1px solid #ddd;text-align:center">CT②</th>
      <th style="padding:5px 6px;border:1px solid #ddd;text-align:center">CT③</th>
    </tr>`;
  }

  const noNums = rows.map(r => parseInt((r.step||'').replace('No.','')));
  rows.forEach((r, ri) => {
    const filled2 = r.date||r.ct||r.review||r.retest||r.precheck;
    const noNum = noNums[ri];
    const prevNo = ri > 0 ? noNums[ri-1] : -1;
    const noStripe = !isNaN(noNum) && noNum % 2 === 0 ? 'background:#f4f4f4;' : '';
    const bg = filled2 ? 'background:#f0faf4;' : noStripe;
    const bt = r.testRangeStart ? 'border-top:2px solid #e67e22;' : (!isNaN(noNum)&&!isNaN(prevNo)&&noNum!==prevNo&&ri>0?'border-top:2px solid #bbb;':'');
    const bb = r.testRangeEnd   ? 'border-bottom:2px solid #e67e22;' : '';
    const ctBg = r.ct==='×'?'background:#fee2e2;':r.ct?'background:#bae6fd;':'';
    const rvBg = r.review==='未'?'background:#fee2e2;':r.review?'background:#bae6fd;':'';
    const rtBg = r.retest==='×'?'background:#fee2e2;':r.retest?'background:#bae6fd;':'';

    if (isKokugo) {
      tableHtml += `<tr style="${bg}${bt}${bb}">
        <td style="padding:4px 6px;border:1px solid #eee;color:var(--gray3)">${r.step||'—'}</td>
        <td style="padding:4px 6px;border:1px solid #eee">${r.title}</td>
        <td style="padding:4px 6px;border:1px solid #eee;text-align:center;${r.date?'background:#bae6fd;':''}">${r.date||''}</td>
        <td style="padding:4px 6px;border:1px solid #eee;text-align:center;${ctBg}">${r.ct||''}</td>
      </tr>`;
    } else if (is10min) {
      tableHtml += `<tr style="${bg}${bt}${bb}">
        <td style="padding:4px 6px;border:1px solid #eee;color:var(--gray3)">${r.step||'—'}</td>
        <td style="padding:4px 6px;border:1px solid #eee">${r.title}</td>
        <td style="padding:4px 6px;border:1px solid #eee;text-align:center;${r.date?'background:#bae6fd;':''}">${r.date||''}</td>
        <td style="padding:4px 6px;border:1px solid #eee;text-align:center;${ctBg}">${r.ct||''}</td>
        <td style="padding:4px 6px;border:1px solid #eee;text-align:center;${rtBg}">${r.retest||''}</td>
      </tr>`;
    } else {
      tableHtml += `<tr style="${bg}${bt}${bb}">
        <td style="padding:4px 6px;border:1px solid #eee;white-space:nowrap;color:var(--gray3)">${r.step||'—'}</td>
        <td style="padding:4px 6px;border:1px solid #eee">${r.title}</td>
        <td style="padding:4px 6px;border:1px solid #eee;text-align:center;white-space:nowrap;color:var(--gray3)">${r.page||''}</td>
        <td style="padding:4px 6px;border:1px solid #eee;text-align:center;${r.date?'background:#bae6fd;':''}">${r.date||''}</td>
        <td style="padding:4px 6px;border:1px solid #eee;text-align:center;${r.date2?'background:#bae6fd;':''}">${r.date2||''}</td>
        <td style="padding:4px 6px;border:1px solid #eee;text-align:center;${ctBg}">${r.ct||''}</td>
        <td style="padding:4px 6px;border:1px solid #eee;text-align:center;${rvBg}">${r.review||''}</td>
        <td style="padding:4px 6px;border:1px solid #eee;text-align:center;${rtBg}">${r.retest||''}</td>
        <td style="padding:4px 6px;border:1px solid #eee;text-align:center;${r.precheck?'background:#bae6fd;':''}">${r.precheck||''}</td>
      </tr>`;
    }
  });
  tableHtml += '</table></div>';
  const content = document.getElementById('sp-tab-content');
  if (content) content.innerHTML = tableHtml;
}

function shareStudent(encodedName) {
  const name = decodeURIComponent(encodedName);
  const records = _records || [];
  const students = getStudents();
  const ps = getPS();
  const s = students.find(st=>st.name===name);
  const sid = s?.id;

  const now = new Date();
  const oneMonthAgo = new Date(now.getFullYear(), now.getMonth()-1, now.getDate());
  const filtered = records.filter(r=>{
    const d = new Date((r.date||'') + 'T00:00:00');
    return (r.studentName===name) && d >= oneMonthAgo && d <= now;
  }).sort((a,b)=>(a.date||'').localeCompare(b.date||''));

  const todayStr = now.toLocaleDateString('ja-JP',{year:'numeric',month:'2-digit',day:'2-digit'});
  const oneMonthAgoStr = oneMonthAgo.toLocaleDateString('ja-JP',{year:'numeric',month:'2-digit',day:'2-digit'});

  // ── 指示表 ──
  const dates = [...new Set(filtered.map(r=>r.date))];
  let instrRows = '';
  dates.forEach(date=>{
    const drecs = filtered.filter(r=>r.date===date);
    const dDisp = drecs[0].dateDisplay || date;
    instrRows += `<tr><td colspan="3" style="background:#e8f5ee;font-weight:700;font-size:11px;padding:4px 8px;border:1px solid #ccc;color:#2d6a4f">📅 ${dDisp}</td></tr>`;
    drecs.forEach(r=>{
      instrRows += `<tr>
        <td style="border:1px solid #ccc;padding:5px 7px;text-align:center;font-size:11px;white-space:nowrap;vertical-align:top">${r.subject||''}</td>
        <td style="border:1px solid #ccc;padding:5px 7px;font-size:11px;vertical-align:top">${(r.hasTest||r.has_test)?'【テスト】'+(r.testContent||r.test_content||'')+'　→　':''}${r.instruction||''}${r.memo?'　📝'+r.memo:''}</td>
        <td style="border:1px solid #ccc;padding:5px 7px;font-size:11px;color:#7c1d6f;vertical-align:top">${r.homework||''}</td>
      </tr>`;
    });
  });

  // ── 進行表 ──
  const tbs = sid ? ((ps[sid]||{}).textbooks||[]) : [];
  let progHtml = '';
  tbs.forEach(tb => {
    const rows = ((ps[sid]||{}).data||{})[tb.key]||[];
    if (!rows.length) return;
    progHtml += `<div style="margin-bottom:14px">
      <div style="font-size:12px;font-weight:700;color:#2d6a4f;background:#e8f5ee;padding:5px 10px;border-radius:6px;margin-bottom:5px">${tb.name}（${tb.grade}）</div>
      <table style="width:100%;border-collapse:collapse;font-size:10px">
        <tr style="background:#f5f5f5">
          <th style="border:1px solid #ccc;padding:4px 5px;width:12%">STEP</th>
          <th style="border:1px solid #ccc;padding:4px 5px">タイトル</th>
          <th style="border:1px solid #ccc;padding:4px 5px;width:8%;text-align:center">P</th>
          <th style="border:1px solid #ccc;padding:4px 5px;width:9%;text-align:center">実施日</th>
          <th style="border:1px solid #ccc;padding:4px 5px;width:7%;text-align:center">CT</th>
          <th style="border:1px solid #ccc;padding:4px 5px;width:8%;text-align:center">補習</th>
          <th style="border:1px solid #ccc;padding:4px 5px;width:7%;text-align:center">再CT</th>
          <th style="border:1px solid #ccc;padding:4px 5px;width:9%;text-align:center">定期前</th>
        </tr>`;
    rows.forEach(r=>{
      const filled = r.date||r.ct||r.review||r.retest||r.precheck;
      const bg = filled ? 'background:#f0faf4;' : '';
      const bt = r.testRangeStart ? 'border-top:2px solid #e67e22;' : '';
      const bb = r.testRangeEnd   ? 'border-bottom:2px solid #e67e22;' : '';
      const ctStyle  = r.ct==='×'     ? 'background:#fee2e2;color:#c0392b;font-weight:700;' : r.ct?'background:#bae6fd;':'';
      const rvStyle  = r.review==='未' ? 'background:#fee2e2;color:#c0392b;font-weight:700;' : r.review?'background:#bae6fd;':'';
      const rtStyle  = r.retest==='×'  ? 'background:#fee2e2;color:#c0392b;font-weight:700;' : r.retest?'background:#bae6fd;':'';
      progHtml += `<tr style="${bg}${bt}${bb}">
        <td style="border:1px solid #eee;padding:3px 4px;color:#888">${r.step||'—'}</td>
        <td style="border:1px solid #eee;padding:3px 4px">${r.title||''}</td>
        <td style="border:1px solid #eee;padding:3px 4px;text-align:center;color:#666">${r.page||''}</td>
        <td style="border:1px solid #eee;padding:3px 4px;text-align:center;${r.date?'background:#bae6fd;':''}">${r.date||''}</td>
        <td style="border:1px solid #eee;padding:3px 4px;text-align:center;${ctStyle}">${r.ct||''}</td>
        <td style="border:1px solid #eee;padding:3px 4px;text-align:center;${rvStyle}">${r.review||''}</td>
        <td style="border:1px solid #eee;padding:3px 4px;text-align:center;${rtStyle}">${r.retest||''}</td>
        <td style="border:1px solid #eee;padding:3px 4px;text-align:center;${r.precheck?'background:#bae6fd;':''}">${r.precheck||''}</td>
      </tr>`;
    });
    progHtml += '</table></div>';
  });

  // プレビュー表示
  const previewContent = document.getElementById('pdf-preview-content');
  previewContent.innerHTML = `
    <div style="font-family:'Hiragino Sans','Meiryo',sans-serif;padding:16px">
      <h2 style="text-align:center;font-size:17px;margin-bottom:3px">学習レポート</h2>
      <div style="text-align:center;font-size:13px;margin-bottom:2px;font-weight:700">${name}（${s?.grade||''} ${s?.school||''}）</div>
      <div style="text-align:center;font-size:11px;color:#666;margin-bottom:16px">${todayStr} 発行</div>

      <div style="font-size:13px;font-weight:700;background:#e8f5ee;padding:6px 10px;border-radius:6px;margin-bottom:8px">
        📝 学習指示表（${oneMonthAgoStr}〜${todayStr}）
      </div>
      ${filtered.length ? `<table style="width:100%;border-collapse:collapse;font-size:11px;margin-bottom:20px">
        <thead><tr>
          <th style="background:#2d6a4f;color:white;padding:5px;text-align:center;border:1px solid #ccc;width:9%">科目</th>
          <th style="background:#2d6a4f;color:white;padding:5px;text-align:center;border:1px solid #ccc;width:57%">実施内容指示</th>
          <th style="background:#2d6a4f;color:white;padding:5px;text-align:center;border:1px solid #ccc;width:34%">宿題</th>
        </tr></thead>
        <tbody>${instrRows}</tbody>
      </table>` : '<div style="font-size:12px;color:#888;padding:8px;margin-bottom:16px">この期間の記録がありません</div>'}

      ${progHtml ? `<div style="font-size:13px;font-weight:700;background:#e8f5ee;padding:6px 10px;border-radius:6px;margin-bottom:10px">
        📊 進行表（全期間）
      </div>${progHtml}` : ''}
    </div>`;

  document.getElementById('pdf-preview-modal').style.display = 'flex';
}

function openPrintTab() {
  const content = document.getElementById('pdf-preview-content');
  if (!content) return;
  const inner = content.innerHTML;
  const parts = [
    '<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8">',
    '<meta name="viewport" content="width=device-width,initial-scale=1.0">',
    '<title>学習レポート</title>',
    '<style>body{font-family:sans-serif;margin:16px;background:white;}',
    'table{border-collapse:collapse;width:100%;}',
    'th,td{border:1px solid #ccc;padding:4px 6px;font-size:11px;}',
    '</style></head><body>',
    inner,
    '</body></html>'
  ];
  const blob = new Blob([parts.join('')], {type:'text/html'});
  const url = URL.createObjectURL(blob);
  window.open(url, '_blank');
}

function buildPrintRows(recs, students) {
  // Group by date then by student
  const dates = [...new Set(recs.map(r=>r.date))].sort();
  let rows = '';
  dates.forEach(date=>{
    const dateRecs = recs.filter(r=>r.date===date);
    const dateDisplay = dateRecs[0].dateDisplay;
    const names = [...new Set(dateRecs.map(r=>r.studentName))];
    // date header row
    rows+=`<tr><td colspan="5" style="background:#e8f5ee;font-weight:700;font-size:13px;padding:6px 10px;border:1px solid #ccc;color:#2d6a4f">📅 ${dateDisplay}</td></tr>`;
    names.forEach(name=>{
      const srecs = dateRecs.filter(r=>r.studentName===name);
      const s = students.find(st=>st.name===name);
      srecs.forEach((r,i)=>{
        rows+=`<tr>
          ${i===0?`<td rowspan="${srecs.length}" style="vertical-align:middle;font-weight:700;font-size:13px;text-align:center;border:1px solid #ccc;padding:7px;white-space:nowrap">${name}<br><span style="font-size:10px;color:#888;font-weight:400">${s?.grade||''} ${s?.school||''}</span></td>`:''}
          <td style="border:1px solid #ccc;padding:7px;text-align:center;font-size:12px;white-space:nowrap">${r.subject}</td>
          <td style="border:1px solid #ccc;padding:7px;font-size:12px">${r.hasTest?'【テスト】'+(r.testContent||'')+'　→　':''}${r.instruction}${r.memo?'　<span style="color:#666">📝'+r.memo+'</span>':''}</td>
          <td style="border:1px solid #ccc;padding:7px;font-size:12px;color:#7c1d6f">${r.homework||''}</td>
        </tr>`;
      });
    });
  });
  return rows;
}

function renderShareList(q='') {
  const students = getStudents();
  let list = students;
  if (shareGrade !== 'all') list = list.filter(s=>s.grade===shareGrade);
  if (q) list = list.filter(s=>s.name.includes(q)||s.yomi.includes(q));
  const el = document.getElementById('share-student-list');

  el.innerHTML = list.map(s => `

        <span style="font-weight:700;font-size:15px">${s.name}</span>

function generatePdf() {
  if (pdfSelectedSids.size === 0) { showToast('⚠️ 生徒を1人以上選んでください'); return; }
  const inclInstr = document.getElementById('pdf-include-instr').checked;
  const inclProg  = document.getElementById('pdf-include-prog').checked;
  if (!inclInstr && !inclProg) { showToast('⚠️ 出力内容を選んでください'); return; }

  const fromVal = document.getElementById('pdf-from').value;
  const toVal   = document.getElementById('pdf-to').value;
  const from = fromVal ? new Date(fromVal) : null;
  const to   = toVal   ? new Date(toVal + 'T23:59:59') : null;

  const students = getStudents();
  const records  = getRecords();
  const ps       = getPS();

  const fromDisp = from ? from.toLocaleDateString('ja-JP',{year:'numeric',month:'2-digit',day:'2-digit'}) : '';
  const toDisp   = to   ? to.toLocaleDateString('ja-JP',{year:'numeric',month:'2-digit',day:'2-digit'}) : '';

  let bodyHtml = `<div style="font-family:'Hiragino Sans','Meiryo',sans-serif;padding:16px;color:#111">`;

  [...pdfSelectedSids].forEach(sid => {
    const s = students.find(st=>st.id===sid);
    if (!s) return;

    bodyHtml += `<div style="page-break-before:auto;margin-bottom:32px">
      <h2 style="font-size:16px;font-weight:700;border-bottom:2px solid #2d6a4f;padding-bottom:6px;margin-bottom:14px;color:#2d6a4f">
        ${s.name}（${s.grade} ${s.school||''}）
      </h2>`;

    // ── 指示表 ──
    if (inclInstr) {
      let recs = records.filter(r=>r.studentName===s.name);
      if (from) recs = recs.filter(r=>new Date(r.date)>=from);
      if (to)   recs = recs.filter(r=>new Date(r.date)<=to);
      recs = recs.sort((a,b)=>a.date.localeCompare(b.date));

      bodyHtml += `<div style="margin-bottom:16px">
        <div style="font-size:13px;font-weight:700;background:#e8f5ee;padding:5px 10px;border-radius:6px;margin-bottom:6px">
          📝 学習指示表　${fromDisp}〜${toDisp}
        </div>`;

      if (!recs.length) {
        bodyHtml += '<div style="font-size:12px;color:#888;padding:8px">この期間の記録がありません</div>';
      } else {
        bodyHtml += `<table style="width:100%;border-collapse:collapse;font-size:11px">
          <tr style="background:#f0faf4">
            <th style="border:1px solid #ccc;padding:5px 6px;text-align:center;width:90px">日付</th>
            <th style="border:1px solid #ccc;padding:5px 6px;text-align:center;width:40px">科目</th>
            <th style="border:1px solid #ccc;padding:5px 6px;text-align:left">実施内容</th>
            <th style="border:1px solid #ccc;padding:5px 6px;text-align:left">宿題</th>
          </tr>`;
        let lastDate = '';
        recs.forEach(r => {
          const showDate = r.dateDisplay !== lastDate;
          lastDate = r.dateDisplay;
          bodyHtml += `<tr>
            <td style="border:1px solid #ccc;padding:5px 6px;text-align:center;font-size:11px;white-space:nowrap">${showDate ? r.dateDisplay : ''}</td>
            <td style="border:1px solid #ccc;padding:5px 6px;text-align:center">${r.subject}</td>

    // ── 進行表 ──

        bodyHtml += `<div style="margin-bottom:8px">

              </tr>`;
          rows.forEach(r => {
            const bg = (r.date||r.ct||r.review||r.retest||r.precheck) ? 'background:#f0faf4;' : '';
            const bt = r.testRangeStart ? 'border-top:2px solid #e67e22;' : '';
            const bb = r.testRangeEnd   ? 'border-bottom:2px solid #e67e22;' : '';
            bodyHtml += `<tr style="${bg}${bt}${bb}">
              <td style="border:1px solid #eee;padding:3px 5px;color:#888">${r.step||'—'}</td>
              <td style="border:1px solid #eee;padding:3px 5px">${r.title}</td>
              <td style="border:1px solid #eee;padding:3px 5px;text-align:center;color:#666">${r.page||''}</td>

    }

    bodyHtml += '</div>';

  bodyHtml += '</div>';

  closePdfModal();
  const el = document.getElementById('pdf-preview-content');

  const modal = document.getElementById('pdf-preview-modal');

function setPdfRange(months) {
  const now = new Date();
  let from, to;
  if (months === 0) { // 先月
    from = new Date(now.getFullYear(), now.getMonth()-1, 1);
    to   = new Date(now.getFullYear(), now.getMonth(), 0);
  } else if (months === 1) { // 今月
    from = new Date(now.getFullYear(), now.getMonth(), 1);
    to   = new Date(now.getFullYear(), now.getMonth()+1, 0);
  } else { // N ヶ月
    from = new Date(now.getFullYear(), now.getMonth()-months+1, 1);
    to   = now;
  }
  const fmt = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  document.getElementById('pdf-from').value = fmt(from);
  document.getElementById('pdf-to').value   = fmt(to);
}

function renderPdfStudentList(q='') {
  const students = getStudents();

  if (pdfGrade!=='all') list = list.filter(s=>s.grade===pdfGrade);
  if (q) list = list.filter(s=>s.name.includes(q)||s.yomi.includes(q));
  const el = document.getElementById('pdf-student-list');
  if (!list.length) { el.innerHTML='<div style="padding:12px;text-align:center;color:var(--gray3);font-size:13px">該当なし</div>'; return; }
  el.innerHTML = list.map(s => `
    <label style="display:flex;align-items:center;gap:8px;padding:8px 12px;border-bottom:1px solid var(--gray1);cursor:pointer">
      <input type="checkbox" ${pdfSelectedSids.has(s.id)?'checked':''} onchange="togglePdfStudent('${s.id}',this.checked)" style="width:16px;height:16px">
      <span style="font-size:13px;font-weight:600">${s.name}</span>
      <span style="font-size:11px;color:var(--gray3)">${s.grade} ${s.school||''}</span>

      <span style="font-size:12px;font-weight:700;color:var(--green)">全員選択</span>
    </label>`.replace('list_ids', JSON.stringify(list.map(s=>s.id)));
}

function printStudent(encodedName) {
  // 本日タブからの印刷: 指示表のみ（進行表なし）
  const name = decodeURIComponent(encodedName);
  const records = _records || [];
  const students = getStudents();
  const s = students.find(st=>st.name===name);

  const now = new Date();
  const oneMonthAgo = new Date(now.getFullYear(), now.getMonth()-1, now.getDate());
  const filtered = records.filter(r=>{
    const d = new Date((r.date||'') + 'T00:00:00');
    return (r.studentName===name) && d >= oneMonthAgo && d <= now;
  }).sort((a,b)=>(a.date||'').localeCompare(b.date||''));

  const todayStr = now.toLocaleDateString('ja-JP',{year:'numeric',month:'2-digit',day:'2-digit'});
  const oneMonthAgoStr = oneMonthAgo.toLocaleDateString('ja-JP',{year:'numeric',month:'2-digit',day:'2-digit'});

  const dates = [...new Set(filtered.map(r=>r.date))];
  let rows = '';
  dates.forEach(date=>{
    const drecs = filtered.filter(r=>r.date===date);
    const dDisp = drecs[0].dateDisplay || date;
    rows += `<tr><td colspan="3" style="background:#e8f5ee;font-weight:700;font-size:12px;padding:5px 8px;border:1px solid #ccc;color:#2d6a4f">📅 ${dDisp}</td></tr>`;
    drecs.forEach(r=>{
      rows += `<tr>
        <td style="border:1px solid #ccc;padding:6px 8px;text-align:center;font-size:12px;white-space:nowrap;vertical-align:top">${r.subject||''}</td>
        <td style="border:1px solid #ccc;padding:6px 8px;font-size:12px;vertical-align:top">${(r.hasTest||r.has_test)?'【テスト】'+(r.testContent||r.test_content||'')+'　→　':''}${r.instruction||''}${r.memo?'　📝'+r.memo:''}</td>
        <td style="border:1px solid #ccc;padding:6px 8px;font-size:12px;color:#7c1d6f;vertical-align:top">${r.homework||''}</td>
      </tr>`;
    });
  });

  const previewContent = document.getElementById('pdf-preview-content');
  previewContent.innerHTML = `
    <div style="font-family:'Hiragino Sans','Meiryo',sans-serif;padding:16px">
      <h2 style="text-align:center;font-size:17px;margin-bottom:3px">学習指示表</h2>
      <div style="text-align:center;font-size:13px;margin-bottom:2px;font-weight:700">${name}（${s?.grade||''} ${s?.school||''}）</div>
      <div style="text-align:center;font-size:11px;color:#666;margin-bottom:12px">${oneMonthAgoStr} 〜 ${todayStr}</div>
      ${filtered.length ? `<table style="width:100%;border-collapse:collapse;font-size:12px">
        <thead><tr>
          <th style="background:#2d6a4f;color:white;padding:6px;text-align:center;border:1px solid #ccc;width:9%">科目</th>
          <th style="background:#2d6a4f;color:white;padding:6px;text-align:center;border:1px solid #ccc;width:57%">実施内容指示</th>
          <th style="background:#2d6a4f;color:white;padding:6px;text-align:center;border:1px solid #ccc;width:34%">宿題</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>` : '<div style="text-align:center;color:#888;padding:20px">過去1ヶ月の記録がありません</div>'}
    </div>`;

  document.getElementById('pdf-preview-modal').style.display = 'flex';
}

// savePim は saveStudentPS を使う
async function savePimNew() {
  const ps=PS();
  if(!ps[pimSid])ps[pimSid]={textbooks:[],data:{}};
  if(pimMode==='master'){
    if(!_cm)_cm={};
    _cm[pimKey]=pimRows.map(r=>({step:r.step,title:r.title,page:r.page||''}));
    await saveSidCM(pimKey);
    // 全生徒に反映
    const allPs=PS();
    Object.keys(allPs).forEach(sid=>{
      if((allPs[sid].textbooks||[]).find(t=>t.key===pimKey)){
        const old2=allPs[sid].data[pimKey]||[];
        allPs[sid].data[pimKey]=pimRows.map(nr=>{
          const ex=old2.find(o=>o.step===nr.step&&o.title===nr.title)||{};
          return {...ex,step:nr.step,title:nr.title,page:nr.page};
        });
      }
    });
    _ps=allPs;
    for(const sid of Object.keys(allPs)){
      if((allPs[sid].textbooks||[]).find(t=>t.key===pimKey)) await saveSidPS(sid);
    }
    showToast('✅ マスターを更新しました');
  } else {
    const ps2=PS();
    ps2[pimSid].data[pimKey]=pimRows;
    _ps=ps2;
    await saveSidPS(pimSid);
    showToast('✅ 進捗を保存しました');
  }
  _lastSave=Date.now();
}
